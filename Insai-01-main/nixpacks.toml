[phases.setup]
nixPkgs = ["nodejs_22", "python311", "gcc"]

[phases.install]
cmds = [
    "npm ci",
    "python3 -m venv venv",
    ". venv/bin/activate && pip install -r python-engine/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]
cacheDirectories = ["node_modules/.cache", ".next/cache"]

[start]
cmd = ". venv/bin/activate && npm run start"
